<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>อ่านทำไม</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', 'Sarabun', system-ui, sans-serif;
            background: #08060b;
            overflow: hidden;
            cursor: pointer;
        }

        #bg-canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        #startScreen {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: opacity 0.9s cubic-bezier(0.16, 1, 0.3, 1),
                        transform 0.9s cubic-bezier(0.16, 1, 0.3, 1);
        }

        #startScreen.hide {
            opacity: 0;
            transform: scale(0.92);
            pointer-events: none;
        }

        #startBtn {
            padding: 22px 72px;
            font-size: 1.2rem;
            font-weight: 500;
            letter-spacing: 6px;
            color: #fff;
            background: transparent;
            border: none;
            border-radius: 999px;
            cursor: pointer;
            position: relative;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            text-transform: uppercase;
        }

        #startBtn .ring {
            position: absolute;
            inset: -2px;
            border-radius: 999px;
            padding: 2px;
            background: linear-gradient(135deg, #ff6b8a, #b7a6ff, #7ae0ff, #ffb7c5, #ff6b8a);
            background-size: 300% 300%;
            animation: flow 5s ease-in-out infinite alternate;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        #startBtn .inner {
            position: relative;
            z-index: 2;
            padding: 18px 48px;
            background: rgba(8, 6, 11, 0.7);
            backdrop-filter: blur(16px);
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: block;
            transition: all 0.4s;
        }

        #startBtn:hover .inner {
            background: rgba(16, 12, 22, 0.85);
            border-color: rgba(255, 255, 255, 0.1);
        }

        #startBtn:hover {
            transform: scale(1.05);
        }

        #startBtn:active {
            transform: scale(0.92);
        }

        @keyframes flow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #mainText {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
            pointer-events: none;
            opacity: 0;
            transform: scale(0.6) translateY(30px);
            transition: opacity 1.4s cubic-bezier(0.16, 1, 0.3, 1),
                        transform 1.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        #mainText.show {
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        #mainText .word {
            font-size: clamp(4.5rem, 20vw, 14rem);
            font-weight: 900;
            letter-spacing: 10px;
            background: linear-gradient(135deg, #ff6b8a, #b7a6ff, #7ae0ff, #ffb7c5, #ff6b8a);
            background-size: 300% 300%;
            animation: flow 4s ease-in-out infinite alternate;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            filter: drop-shadow(0 0 80px rgba(183, 166, 255, 0.15));
            text-shadow: 0 0 100px rgba(255, 80, 120, 0.08);
        }

        @media (max-width: 480px) {
            #startBtn {
                padding: 14px 36px;
            }
            #startBtn .inner {
                padding: 12px 28px;
                font-size: 0.95rem;
                letter-spacing: 4px;
            }
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div id="startScreen">
        <button id="startBtn">
            <span class="ring"></span>
            <span class="inner">เปิด</span>
        </button>
    </div>

    <div id="mainText">
        <span class="word">อ่านทำไม</span>
    </div>

    <audio id="bgm" src="https://far-amber-wls0t5sy.edgeone.dev/%E0%B8%94%E0%B8%B2%E0%B8%A7%E0%B8%99%E0%B9%8C%E0%B9%82%E0%B8%AB%E0%B8%A5%E0%B8%94%20(4).mp3" loop preload="auto"></audio>

    <script>
        const bgCanvas = document.getElementById('bg-canvas');
        const ctx = bgCanvas.getContext('2d');
        let W, H;

        function resize() {
            W = bgCanvas.width = window.innerWidth;
            H = bgCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        const particles = [];
        const COUNT = 55;

        class Particle {
            constructor() {
                this.x = Math.random() * W;
                this.y = Math.random() * H;
                this.size = 1.2 + Math.random() * 2.8;
                this.vx = (Math.random() - 0.5) * 0.2;
                this.vy = (Math.random() - 0.5) * 0.2;
                this.alpha = 0.1 + Math.random() * 0.3;
                this.hue = 250 + Math.random() * 90;
                this.phase = Math.random() * Math.PI * 2;
            }
            update(t) {
                this.x += this.vx + Math.sin(t * 0.0003 + this.phase) * 0.06;
                this.y += this.vy + Math.cos(t * 0.0004 + this.phase * 0.6) * 0.06;
                if (this.x < -20) this.x = W + 20;
                if (this.x > W + 20) this.x = -20;
                if (this.y < -20) this.y = H + 20;
                if (this.y > H + 20) this.y = -20;
            }
            draw(ctx) {
                const grad = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.size * 2.5
                );
                grad.addColorStop(0, `hsla(${this.hue}, 80%, 75%, ${this.alpha * 0.9})`);
                grad.addColorStop(1, `hsla(${this.hue + 30}, 80%, 60%, 0)`);
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 2.5, 0, Math.PI * 2);
                ctx.fillStyle = grad;
                ctx.fill();
            }
        }

        for (let i = 0; i < COUNT; i++) {
            particles.push(new Particle());
        }

        let time = 0;

        function drawBg() {
            const grad = ctx.createRadialGradient(W * 0.5, H * 0.4, 0, W * 0.5, H * 0.5, W * 0.95);
            grad.addColorStop(0, '#14101e');
            grad.addColorStop(0.6, '#0a0810');
            grad.addColorStop(1, '#040308');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, W, H);

            time += 1;

            for (const p of particles) {
                p.update(time);
                p.draw(ctx);
            }

            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const maxDist = 140 + 40 * Math.sin(time * 0.0002 + i);
                    if (dist < maxDist) {
                        const a = (1 - dist / maxDist) * 0.1;
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = `hsla(280, 60%, 70%, ${a})`;
                        ctx.lineWidth = 0.5;
                        ctx.stroke();
                    }
                }
            }

            for (let i = 0; i < 4; i++) {
                const x = (Math.sin(time * 0.0004 + i * 1.8) * 0.35 + 0.5) * W;
                const y = (Math.cos(time * 0.0005 + i * 1.4) * 0.3 + 0.5) * H;
                const r = 70 + 40 * Math.sin(time * 0.0002 + i * 2);
                const g = ctx.createRadialGradient(x, y, 0, x, y, r);
                g.addColorStop(0, `hsla(${280 + i * 50}, 60%, 60%, 0.025)`);
                g.addColorStop(1, `hsla(${280 + i * 50}, 60%, 50%, 0)`);
                ctx.beginPath();
                ctx.arc(x, y, r, 0, Math.PI * 2);
                ctx.fillStyle = g;
                ctx.fill();
            }

            requestAnimationFrame(drawBg);
        }
        drawBg();

        const startScreen = document.getElementById('startScreen');
        const startBtn = document.getElementById('startBtn');
        const mainText = document.getElementById('mainText');
        const bgm = document.getElementById('bgm');

        let started = false;

        function start() {
            if (started) return;
            started = true;

            startScreen.classList.add('hide');

            setTimeout(() => {
                mainText.classList.add('show');
            }, 350);

            bgm.currentTime = 0;
            bgm.play().catch(() => {});
        }

        startBtn.addEventListener('click', start);
        document.addEventListener('click', () => {
            if (!started) start();
        });
    </script>

</body>
</html>
