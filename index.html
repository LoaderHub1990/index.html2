<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>หัวใจ</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #000;
    overflow: hidden;
    font-family: "Segoe UI", "Sarabun", sans-serif;
  }
  #wrap {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  canvas {
    display: block;
    transition: opacity 1.1s ease;
  }
  #startScreen {
    position: absolute;
    inset: 0;
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 10;
    transition: opacity 0.6s ease;
  }
  #startBtn {
    padding: 18px 48px;
    font-size: 20px;
    letter-spacing: 2px;
    color: #fff;
    background: linear-gradient(135deg, #ff4d6d, #ffb703, #06d6a0, #4cc9f0);
    background-size: 300% 300%;
    animation: shift 4s ease infinite;
    border: none;
    border-radius: 999px;
    cursor: pointer;
    box-shadow: 0 0 30px rgba(255, 77, 109, 0.6);
  }
  @keyframes shift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  #startBtn:hover { transform: scale(1.06); }
  #hint {
    margin-top: 18px;
    color: #ddd;
    font-size: 13px;
    letter-spacing: 1px;
    opacity: 0.8;
  }
  #bigText {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: clamp(60px, 16vw, 220px);
    font-weight: 900;
    letter-spacing: 4px;
    opacity: 0;
    transform: scale(0.7);
    transition: opacity 1s ease, transform 1s ease;
    text-shadow: 0 0 40px rgba(255,255,255,0.6);
    background: linear-gradient(135deg, #ff4d6d, #ffb703, #06d6a0, #4cc9f0, #ff4d6d);
    background-size: 400% 400%;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shift 3s ease infinite;
    pointer-events: none;
  }
  #muteBtn {
    position: absolute;
    top: 18px;
    right: 18px;
    z-index: 20;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.3);
    color: #fff;
    border-radius: 999px;
    padding: 8px 14px;
    font-size: 13px;
    cursor: pointer;
    display: none;
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="bigText">อ่านทำไม</div>

  <div id="startScreen">
    <button id="startBtn">เริ่ม</button>
    <div id="hint">กดเพื่อเริ่มและเปิดเสียงเพลง</div>
  </div>

  <button id="muteBtn">🔊 เสียง</button>
</div>

<audio id="bgm" src="https://far-amber-wls0t5sy.edgeone.dev/%E0%B8%94%E0%B8%B2%E0%B8%A7%E0%B8%99%E0%B9%8C%E0%B9%82%E0%B8%AB%E0%B8%A5%E0%B8%94%20(4).mp3" loop preload="auto"></audio>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const startScreen = document.getElementById('startScreen');
const startBtn = document.getElementById('startBtn');
const bigText = document.getElementById('bigText');
const bgm = document.getElementById('bgm');
const muteBtn = document.getElementById('muteBtn');

function resize() {
  const size = Math.min(window.innerWidth, window.innerHeight) * 0.95;
  canvas.width = size;
  canvas.height = size;
}
resize();
window.addEventListener('resize', resize);

function heartPoint(t, size) {
  const x = 16 * Math.pow(Math.sin(t), 3);
  const y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
  return { x: x * size, y: -y * size };
}

// หลักการแบบเดียวกับโค้ดต้นฉบับ: วาดรูปเดิมซ้ำๆ ที่จุดศูนย์กลางเดียวกัน ไม่หมุน
// แต่ "ต่อ" ขึ้นไปเรื่อยๆ โดยแต่ละรอบขนาดใหญ่กว่ารอบก่อนหน้านิดเดียว วาดเร็วๆ ต่อกันจนเต็มขนาด
// เพราะซ้อนกันถี่ๆ จากเล็กไปใหญ่ จะเห็นเป็นเส้นเรียงตัวหนาแน่นเป็นรูปหัวใจ ไล่สีรุ้งอลังการ
const TOTAL = 260;              // จำนวนชั้นหัวใจทั้งหมดที่จะต่อกัน
const HUE_STEP = 2;              // ไล่สีทีละนิดในแต่ละชั้น

let cx, cy, minSize, maxSize;
let count = 0;
let hue = 0;

function setupCanvas() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  cx = canvas.width / 2;
  cy = canvas.height / 2 + canvas.height * 0.05;
  minSize = canvas.width / 400;
  maxSize = canvas.width / 30;
  count = 0;
  hue = 0;
}

function animate() {
  if (count < TOTAL) {
    // วาดหลายชั้นต่อเฟรม ให้ต่อกันไวๆ แต่ยังเห็นเป็นแอนิเมชัน
    const batch = 3;
    for (let n = 0; n < batch && count < TOTAL; n++) {
      const progress = count / (TOTAL - 1);
      const size = minSize + (maxSize - minSize) * progress; // ค่อยๆใหญ่ขึ้นทุกชั้น ไม่หมุน
      drawHeart(cx, cy, size, hue % 360);
      hue += HUE_STEP;
      count++;
    }
    requestAnimationFrame(animate);
  } else {
    setTimeout(fadeOutHeart, 700);
  }
}

function drawHeart(px, py, sz, h) {
  ctx.beginPath();
  const steps = 140;
  for (let i = 0; i <= steps; i++) {
    const t = (i / steps) * Math.PI * 2;
    const p = heartPoint(t, sz);
    const x = px + p.x;
    const y = py + p.y;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.strokeStyle = `hsl(${h}, 100%, 60%)`;
  ctx.shadowColor = `hsl(${h}, 100%, 65%)`;
  ctx.shadowBlur = 6;
  ctx.lineWidth = 1.4;
  ctx.stroke();
  ctx.shadowBlur = 0;
}

function fadeOutHeart() {
  canvas.style.opacity = 0;
  setTimeout(showBigText, 1100);
}

function showBigText() {
  bigText.style.opacity = 1;
  bigText.style.transform = 'scale(1)';
}

startBtn.addEventListener('click', () => {
  startScreen.style.opacity = 0;
  setTimeout(() => (startScreen.style.display = 'none'), 600);
  bgm.currentTime = 0;
  bgm.play().catch(() => {});
  muteBtn.style.display = 'block';

  resize();
  setupCanvas();
  requestAnimationFrame(animate);
});

muteBtn.addEventListener('click', () => {
  bgm.muted = !bgm.muted;
  muteBtn.textContent = bgm.muted ? '🔇 เงียบ' : '🔊 เสียง';
});
</script>
</body>
</html>
