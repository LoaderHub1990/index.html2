<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>อ่านทำไม</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', 'Sarabun', system-ui, -apple-system, sans-serif;
            background: #08060b;
            overflow: hidden;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
        }

        #bg-canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            touch-action: none;
        }

        #mainText {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
            pointer-events: none;
            opacity: 0;
            transform: scale(0.6) translateY(30px);
            animation: appear 1.6s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
            padding: 20px;
        }

        @keyframes appear {
            0% {
                opacity: 0;
                transform: scale(0.6) translateY(30px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        #mainText .word {
            font-size: clamp(3rem, 18vw, 12rem);
            font-weight: 900;
            letter-spacing: clamp(4px, 2vw, 10px);
            background: linear-gradient(135deg, #ff6b8a, #b7a6ff, #7ae0ff, #ffb7c5, #ff6b8a);
            background-size: 300% 300%;
            animation: flow 4s ease-in-out infinite alternate;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            filter: drop-shadow(0 0 60px rgba(183, 166, 255, 0.12));
            text-shadow: 0 0 80px rgba(255, 80, 120, 0.06);
            text-align: center;
            word-break: keep-all;
            padding: 0 10px;
        }

        @keyframes flow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @media (max-width: 480px) {
            #mainText .word {
                letter-spacing: 4px;
            }
        }

        @media (max-width: 380px) {
            #mainText .word {
                font-size: 2.8rem;
                letter-spacing: 2px;
            }
        }

        @media (orientation: landscape) and (max-height: 500px) {
            #mainText .word {
                font-size: clamp(2.5rem, 12vh, 6rem);
                letter-spacing: 4px;
            }
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div id="mainText">
        <span class="word">อ่านทำไม</span>
    </div>

    <audio id="bgm" src="https://far-amber-wls0t5sy.edgeone.dev/%E0%B8%94%E0%B8%B2%E0%B8%A7%E0%B8%99%E0%B9%8C%E0%B9%82%E0%B8%AB%E0%B8%A5%E0%B8%94%20(4).mp3" loop preload="auto"></audio>

    <script>
        (function() {
            const bgCanvas = document.getElementById('bg-canvas');
            const ctx = bgCanvas.getContext('2d');
            let W, H;
            let dpr = 1;

            function resize() {
                const rect = bgCanvas.getBoundingClientRect();
                W = window.innerWidth;
                H = window.innerHeight;
                
                dpr = Math.min(window.devicePixelRatio || 1, 2);
                
                bgCanvas.width = W * dpr;
                bgCanvas.height = H * dpr;
                bgCanvas.style.width = W + 'px';
                bgCanvas.style.height = H + 'px';
                
                ctx.scale(dpr, dpr);
            }

            window.addEventListener('resize', () => {
                resize();
                for (const p of particles) {
                    p.x = Math.random() * W;
                    p.y = Math.random() * H;
                }
            });

            window.addEventListener('orientationchange', () => {
                setTimeout(resize, 300);
            });

            resize();

            const particles = [];
            const COUNT = Math.min(55, Math.floor((W * H) / 25000) + 30);

            class Particle {
                constructor() {
                    this.x = Math.random() * W;
                    this.y = Math.random() * H;
                    this.size = 1 + Math.random() * 2.5;
                    this.vx = (Math.random() - 0.5) * 0.15;
                    this.vy = (Math.random() - 0.5) * 0.15;
                    this.alpha = 0.08 + Math.random() * 0.25;
                    this.hue = 250 + Math.random() * 90;
                    this.phase = Math.random() * Math.PI * 2;
                }
                update(t) {
                    this.x += this.vx + Math.sin(t * 0.00025 + this.phase) * 0.04;
                    this.y += this.vy + Math.cos(t * 0.0003 + this.phase * 0.6) * 0.04;
                    if (this.x < -20) this.x = W + 20;
                    if (this.x > W + 20) this.x = -20;
                    if (this.y < -20) this.y = H + 20;
                    if (this.y > H + 20) this.y = -20;
                }
                draw(ctx) {
                    const grad = ctx.createRadialGradient(
                        this.x, this.y, 0,
                        this.x, this.y, this.size * 2.8
                    );
                    grad.addColorStop(0, `hsla(${this.hue}, 80%, 75%, ${this.alpha * 0.9})`);
                    grad.addColorStop(1, `hsla(${this.hue + 30}, 80%, 60%, 0)`);
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size * 2.8, 0, Math.PI * 2);
                    ctx.fillStyle = grad;
                    ctx.fill();
                }
            }

            for (let i = 0; i < COUNT; i++) {
                particles.push(new Particle());
            }

            let time = 0;
            let frameId = null;

            function drawBg() {
                const grad = ctx.createRadialGradient(W * 0.5, H * 0.4, 0, W * 0.5, H * 0.5, W * 0.95);
                grad.addColorStop(0, '#14101e');
                grad.addColorStop(0.6, '#0a0810');
                grad.addColorStop(1, '#040308');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, W, H);

                time += 1;

                for (const p of particles) {
                    p.update(time);
                    p.draw(ctx);
                }

                const connectDist = Math.min(140, W * 0.18);
                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        const maxDist = connectDist + 30 * Math.sin(time * 0.0002 + i);
                        if (dist < maxDist) {
                            const a = (1 - dist / maxDist) * 0.08;
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.strokeStyle = `hsla(280, 60%, 70%, ${a})`;
                            ctx.lineWidth = 0.4;
                            ctx.stroke();
                        }
                    }
                }

                for (let i = 0; i < 3; i++) {
                    const x = (Math.sin(time * 0.0004 + i * 1.8) * 0.35 + 0.5) * W;
                    const y = (Math.cos(time * 0.0005 + i * 1.4) * 0.3 + 0.5) * H;
                    const r = 60 + 30 * Math.sin(time * 0.0002 + i * 2);
                    const g = ctx.createRadialGradient(x, y, 0, x, y, r);
                    g.addColorStop(0, `hsla(${280 + i * 50}, 60%, 60%, 0.02)`);
                    g.addColorStop(1, `hsla(${280 + i * 50}, 60%, 50%, 0)`);
                    ctx.beginPath();
                    ctx.arc(x, y, r, 0, Math.PI * 2);
                    ctx.fillStyle = g;
                    ctx.fill();
                }

                frameId = requestAnimationFrame(drawBg);
            }

            drawBg();

            const bgm = document.getElementById('bgm');

            function playAudio() {
                bgm.volume = 0.6;
                bgm.play().catch(() => {});
            }

            playAudio();

            document.addEventListener('click', function playOnFirstClick() {
                if (bgm.paused) {
                    bgm.play().catch(() => {});
                }
                document.removeEventListener('click', playOnFirstClick);
            }, { once: true });

            document.addEventListener('touchstart', function playOnFirstTouch() {
                if (bgm.paused) {
                    bgm.play().catch(() => {});
                }
                document.removeEventListener('touchstart', playOnFirstTouch);
            }, { once: true });

            if (frameId) {
                cancelAnimationFrame(frameId);
                drawBg();
            }

        })();
    </script>

</body>
</html>
